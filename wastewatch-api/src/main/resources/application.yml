spring:
  application:
    name: wastewatch-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none         # never "create" or "update" in production
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      url: redis://localhost:6379

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://placeholder.supabase.co/auth/v1/keys

#  async:
#    executor:
#      core-pool-size: 4
#      max-pool-size: 8

server:
  port: 8080
  servlet:
    context-path: /api/v1

